name: Node Optimized App CI/CD

# 1. Trigger kab hoga? Jab main branch par push ho.
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 2. GitHub se code uthao
      - name: Checkout Code
        uses: actions/checkout@v3

      # 3. Docker Hub mein login karo (Secrets se)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Docker Buildx setup karo (Fast building ke liye)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 5. Build aur Push (Multi-stage Dockerfile apne aap handle hogi)
      - name: Build and Push Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Image ka naam: shivendra01/node-optimized-app
          tags: ${{ secrets.DOCKER_USERNAME }}/node-optimized-app:latest
          # Caching taaki agli baar build fast ho
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/node-optimized-app:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/node-optimized-app:buildcache,mode=max
